name: Deploy & Release

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"
          
      - name: Check changed files
        id: changes
        run: |
          git fetch origin master --depth=2
          CHANGES=$(git diff --name-only origin/master...HEAD -- '.github/**' ':!.github/workflows/deploy.yml' || true)
          if [ -z "$CHANGES" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Changed files in .github: $CHANGES"
          fi
          
      - name: Bump version
        if: steps.changes.outputs.skip == 'false'
        id: bump_version
        run: |
          CURRENT_TAG=${{ steps.get_tag.outputs.TAG }}
          VERSION=${CURRENT_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag: $NEW_TAG"
          
      - name: Push new tag
        if: steps.changes.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump_version.outputs.NEW_TAG }}
          git push origin ${{ steps.bump_version.outputs.NEW_TAG }}
          
      - name: Create Release
        if: steps.changes.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.NEW_TAG }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for tag propagation
        if: steps.changes.outputs.skip == 'false'
        run: sleep 15
          
      - name: Send Telegram notification
        if: success() && steps.changes.outputs.skip == 'false'
        run: |
          git fetch --tags
          TAG="${{ steps.bump_version.outputs.NEW_TAG }}"
          MESSAGE="🚀 *Deploy Successful!*

          🌐 *Site:* neforceo.ilnazik.dev

          📦 *Release:* ${TAG}

          👤 *Author:* ${{ github.actor }}
          🕐 *Time:* ${{ github.event.head_commit.timestamp }}"

          KEYBOARD='{"inline_keyboard":[[{"text":"📦 Repository","url":"https://github.com/'${{ github.repository }}'"}]]}'

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD}"
