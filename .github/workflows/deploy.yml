name: Deploy & Release

on:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check_tag.outputs.skip }}
      version: ${{ steps.check_tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version tag
        id: check_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "Checking for tag: $TAG"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag ${TAG} not found — proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.skip == 'false'
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    runs-on: ubuntu-latest
    needs: [check, deploy]
    if: needs.check.outputs.skip == 'false'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram notification
        if: success()
        run: |
          TAG="${{ needs.check.outputs.version }}"
          MESSAGE="🚀 *Deploy Successful!*

          🌐 *Site:* www.sudoteach.tech

          📦 *Release:* ${TAG}

          👤 *Author:* ${{ github.actor }}
          🕐 *Time:* ${{ github.event.head_commit.timestamp }}"

          KEYBOARD='{"inline_keyboard":[[{"text":"📦 Repository","url":"https://github.com/${{ github.repository }}"}]]}'

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD}"
